<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c16;--bg2:#0e1422;--bg3:#161e30;--bg4:#1e2842;--a:#00e5ff;--a2:#7c4dff;--a3:#ff6d00;--a4:#00e676;--a5:#ff1744;--t:#dce4f0;--t2:#8a96ad;--t3:#556078;--bd:rgba(255,255,255,.06)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);overflow:hidden;height:100vh;display:flex;flex-direction:column}

header{height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);background:rgba(8,12,22,.92);backdrop-filter:blur(12px);position:relative;z-index:600;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#d4a017,#f5c842,#c8902e);display:grid;place-items:center;font:700 13px/1 'JetBrains Mono';color:#1a1200;box-shadow:0 0 12px rgba(212,160,23,.3)}
.logo h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
.logo h1 small{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:.5px;margin-left:6px;font-weight:400}
.tabs{display:flex;gap:3px;overflow-x:auto}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--t3);background:transparent;border:1px solid transparent;font-family:inherit;transition:.15s;white-space:nowrap}
.tab:hover{color:var(--t);background:var(--bg3)}
.tab.on{color:var(--a);border-color:rgba(0,229,255,.25);background:rgba(0,229,255,.06)}

.kpis{display:flex;border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.kpi{flex:1;min-width:130px;padding:10px 16px;text-align:center;border-right:1px solid var(--bd)}
.kpi:last-child{border:none}
.kpi .v{font:700 20px/1.2 'JetBrains Mono',monospace}
.kpi .l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}

.main{display:grid;grid-template-columns:280px 1fr 340px;flex:1;min-height:0}

/* FOOTER */
.footer{height:28px;display:flex;align-items:center;justify-content:center;border-top:1px solid var(--bd);background:rgba(8,12,22,.95);font-size:11px;color:var(--t3);gap:6px;flex-shrink:0}
.footer a{color:var(--t2);text-decoration:none}
.footer .gold{color:#d4a017;font-weight:600}

/* LEFT SIDEBAR */
.side{overflow-y:auto;border-right:1px solid var(--bd);display:flex;flex-direction:column;min-height:0}
.side-hd{padding:10px 12px;border-bottom:1px solid var(--bd)}
.side-hd input{width:100%;padding:7px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg2);color:var(--t);font:13px 'DM Sans';outline:none}
.side-hd input:focus{border-color:var(--a)}
.chip-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.chip{padding:3px 9px;border-radius:12px;font-size:10px;cursor:pointer;border:1px solid var(--bd);color:var(--t3);transition:.12s}
.chip.on{color:#fff}
.elist{flex:1;overflow-y:auto;padding:4px 0}
.ei{padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;border-left:3px solid transparent;transition:.1s}
.ei:hover{background:var(--bg3)}
.ei.sel{background:var(--bg4);border-left-color:var(--a)}
.ei .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ei .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.ei .fl{font-size:9px;padding:1px 4px;border-radius:3px;flex-shrink:0}
.ei .xf{background:rgba(255,23,68,.12);color:var(--a5)}
.ei .co{color:var(--t3);font-size:10px;flex-shrink:0}

/* MAP */
.map-wrap{position:relative;z-index:0;overflow:hidden}
#map{width:100%;height:100%;background:#080c16}
.leaflet-control-zoom{border:1px solid var(--bd)!important}
.leaflet-control-zoom a{background:var(--bg3)!important;color:var(--t)!important;border-color:var(--bd)!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:var(--bg4)!important;color:var(--a)!important}
.leaflet-container{background:var(--bg)!important;font-family:'DM Sans'!important}
.q-marker{border-radius:50%;border:2px solid;cursor:pointer;transition:.15s;box-shadow:0 0 8px rgba(0,0,0,.4)}
.q-marker:hover{transform:scale(1.4);z-index:9999!important}
.q-marker.export-ctrl{box-shadow:0 0 0 3px rgba(255,23,68,.35),0 0 12px rgba(255,23,68,.2)}
.q-marker.selected{transform:scale(1.6);box-shadow:0 0 0 4px rgba(0,229,255,.4),0 0 20px rgba(0,229,255,.3);z-index:10000!important}
.q-popup .leaflet-popup-content-wrapper{background:var(--bg4);color:var(--t);border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.q-popup .leaflet-popup-tip{background:var(--bg4);border:1px solid var(--bd)}
.q-popup .leaflet-popup-content{margin:12px 16px;font:13px/1.5 'DM Sans'}
.q-popup h3{font-size:15px;margin-bottom:2px}
.q-popup .sub{font-size:11px;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.q-popup .det{font-size:12px;color:var(--t2);line-height:1.6}
.q-popup .xbadge{display:inline-block;padding:2px 8px;border-radius:4px;background:rgba(255,23,68,.12);color:var(--a5);font-size:11px;font-weight:600;margin-top:4px}

/* FLOATING HOVER CARD */
.hover-card{position:fixed;z-index:10000;pointer-events:none;display:none;min-width:260px;max-width:340px;background:rgba(14,20,34,.96);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:14px 18px;box-shadow:0 12px 48px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.hover-card.show{display:block;animation:hcFadeIn .15s ease-out}
@keyframes hcFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hc-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.hc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;box-shadow:0 0 8px var(--hc-color)}
.hc-name{font-size:15px;font-weight:600;line-height:1.2}
.hc-type{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-top:2px;opacity:.7}
.hc-divider{height:1px;background:rgba(255,255,255,.06);margin:8px 0}
.hc-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:5px}
.hc-row b{color:var(--t);font-weight:500}
.hc-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center;opacity:.6}
.hc-links{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.hc-link{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--t2)}
.hc-export{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:4px 10px;border-radius:5px;background:rgba(255,23,68,.1);border:1px solid rgba(255,23,68,.2);color:#ff5252;font-size:11px;font-weight:600}

.map-legend{position:absolute;bottom:14px;left:14px;z-index:500;background:rgba(8,12,22,.88);backdrop-filter:blur(8px);padding:8px 12px;border-radius:8px;border:1px solid var(--bd);display:flex;flex-wrap:wrap;gap:8px}
.ml{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--t2)}
.ml i{width:8px;height:8px;border-radius:50%;display:inline-block}

/* RIGHT PANEL */
.rp{overflow-y:auto;border-left:1px solid var(--bd);min-height:0}
.card{padding:14px 16px;border-bottom:1px solid var(--bd)}
.card-t{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.badge{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.b-c{background:rgba(255,23,68,.1);color:var(--a5)}.b-w{background:rgba(255,109,0,.1);color:var(--a3)}.b-i{background:rgba(0,229,255,.1);color:var(--a)}.b-x{background:rgba(255,23,68,.15);color:var(--a5)}
.card-b{font-size:13px;color:var(--t2);line-height:1.65}
table.bom{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}
table.bom th{text-align:left;padding:5px 6px;border-bottom:1px solid var(--bd);color:var(--t3);text-transform:uppercase;font-size:9px;letter-spacing:.6px;font-weight:600}
table.bom td{padding:5px 6px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--t2);vertical-align:top}
table.bom tr:hover td{background:var(--bg3);color:var(--t)}
.bom .cat{color:var(--a);font-weight:600}
.bom .pri{color:var(--t);font-weight:500}
.bom .sec{color:var(--t3);font-size:10px;font-style:italic;display:block;margin-top:1px}
.bom .xctl{color:var(--a5);font-size:10px;font-weight:600}
.stat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px}
.stat:last-child{border:none}
.stat .sl{color:var(--t2)}.stat .sv{font:600 12px 'JetBrains Mono',monospace}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ============ MOBILE RESPONSIVE ============ */
@media(max-width:1024px){
  body{overflow-y:auto;height:auto;min-height:100vh}
  
  header{height:auto;min-height:48px;padding:8px 12px;flex-wrap:wrap;gap:8px}
  .logo h1{font-size:14px}
  .logo h1 small{display:none}
  .tabs{width:100%;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .tab{padding:5px 10px;font-size:11px;flex-shrink:0}
  
  .kpis{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
  .kpi{min-width:110px;padding:8px 10px}
  .kpi .v{font-size:16px}
  .kpi .l{font-size:8px}
  
  .main{display:flex;flex-direction:column;flex:none;height:auto}
  
  /* MAP FIRST on mobile */
  .map-wrap{order:-1;height:60vh;min-height:360px;width:100%;border-bottom:1px solid var(--bd)}
  .map-legend{bottom:6px;left:6px;padding:5px 8px;gap:5px;max-width:calc(100% - 80px);overflow-x:auto;flex-wrap:nowrap}
  .ml{font-size:8px;white-space:nowrap}
  
  /* Sidebar below map */
  .side{order:0;border-right:none;border-bottom:1px solid var(--bd);max-height:50vh;width:100%}
  .elist{max-height:300px}
  
  /* Right panel last, full scroll */
  .rp{order:1;border-left:none;width:100%;overflow-y:visible}
  
  /* Cards more compact on mobile */
  .card{padding:12px}
  .card-t{font-size:13px}
  .card-b{font-size:12px}
  table.bom{font-size:10px}
  table.bom .sec{font-size:9px}
  
  /* Hover card adjustments */
  .hover-card{max-width:280px;min-width:200px}
  .hc-name{font-size:13px}
  
  .footer{height:auto;padding:8px 12px;flex-wrap:wrap;text-align:center}
}

@media(max-width:600px){
  header{padding:6px 10px}
  .logo-mark{width:24px;height:24px;font-size:11px;border-radius:5px}
  .logo h1{font-size:13px}
  .tabs{gap:2px}
  .tab{padding:4px 8px;font-size:10px}
  
  .kpi{min-width:90px;padding:6px 8px}
  .kpi .v{font-size:14px}
  .kpi .l{font-size:7px;letter-spacing:.5px}
  
  .map-wrap{height:55vh;min-height:300px}
  .map-legend{display:none}
  
  .side-hd{padding:8px 10px}
  .chip{font-size:9px;padding:2px 6px}
  .ei{padding:5px 8px;font-size:11px}
  
  .card{padding:10px}
  .card-t{font-size:12px}
  .card-b{font-size:11px;line-height:1.5}
  table.bom{font-size:9px}
  table.bom th{font-size:7px;padding:3px 4px}
  table.bom td{padding:3px 4px}
  
  .hover-card{max-width:240px;min-width:180px;padding:10px 12px}
  .hc-name{font-size:12px}
  .hc-row{font-size:11px}
  .hc-link{font-size:9px}
  
  .stat{font-size:11px}
  .footer{font-size:10px}
}
</style>

// ============ LEAFLET MAP ============
let layer='all',sel=null;
const map=L.map('map',{center:[30,0],zoom:2,minZoom:2,maxZoom:12,zoomControl:true,attributionControl:false,worldCopyJump:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19,pane:'shadowPane'}).addTo(map);

const markers={},lines=[];
const markerLayer=L.layerGroup().addTo(map);
const lineLayer=L.layerGroup().addTo(map);

function buildMarkers(){
  markerLayer.clearLayers();lineLayer.clearLayers();
  const vis=e=>layer==='all'||e.c===layer;
  // Lines first
  D.forEach(e=>{if(!vis(e))return;
    e.cn.forEach(tn=>{
      const t=D.find(x=>x.n===tn);if(!t)return;
      if(!vis(t)&&layer!=='all')return;
      const hi=sel&&(sel.n===e.n||sel.n===t.n);
      const line=L.polyline([[e.la,e.lo],[t.la,t.lo]],{
        color:hi?(CC[e.c]||'#4fc3f7'):'rgba(100,160,220,0.12)',
        weight:hi?2.5:.8,
        opacity:hi?.7:.4,
        dashArray:hi?null:'4 4',
        className:'supply-line'
      });
      lineLayer.addLayer(line);
    });
  });
  // Markers
  D.forEach(e=>{if(!vis(e))return;
    const sz=e.c==='minerals'?12:e.c==='computing'?11:10;
    const dim=(sel&&sel.n!==e.n&&!sel.cn.includes(e.n)&&!e.cn.includes(sel?.n));
    const icon=L.divIcon({
      className:'',
      html:`<div class="q-marker${e.x?' export-ctrl':''}${sel&&sel.n===e.n?' selected':''}" style="width:${sz}px;height:${sz}px;background:${CC[e.c]};border-color:${CC[e.c]};opacity:${dim?.25:1}"></div>`,
      iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });
    const m=L.marker([e.la,e.lo],{icon}).addTo(markerLayer);

    // Hover events for floating card
    m.on('mouseover',function(ev){showHoverCard(e, ev.originalEvent);});
    m.on('mousemove',function(ev){moveHoverCard(ev.originalEvent);});
    m.on('mouseout',function(){hideHoverCard();});

    // Click to select
    m.on('click',function(){
      sel=e;
      buildMarkers();
      renderList();
      showHoverCard(e, null, true);
    });
    markers[e.n]=m;
  });
}

// ============ FLOATING HOVER CARD ============
const hcEl=document.getElementById('hoverCard');
let hcPinned=false;

function showHoverCard(e, ev, pinned){
  hcPinned=!!pinned;
  const col=CC[e.c];
  const connectedTo=e.cn.length?e.cn:[];
  const suppliedBy=D.filter(x=>x.cn.includes(e.n)).map(x=>x.n);
  
  hcEl.innerHTML=`
    <div class="hc-header">
      <div class="hc-dot" style="background:${col};--hc-color:${col}"></div>
      <div>
        <div class="hc-name" style="color:${col}">${e.n}</div>
        <div class="hc-type" style="color:${col}">${CL[e.c]}</div>
      </div>
    </div>
    <div class="hc-divider"></div>
    <div class="hc-row"><span class="hc-icon">⚙</span><b>${e.s}</b></div>
    <div class="hc-row"><span class="hc-icon">📍</span>${e.ci} &nbsp;(${e.co})</div>
    ${connectedTo.length?`<div class="hc-row"><span class="hc-icon">→</span><span>Supplies from:</span></div><div class="hc-links">${connectedTo.map(n=>`<span class="hc-link">${n}</span>`).join('')}</div>`:''}
    ${suppliedBy.length?`<div class="hc-row" style="margin-top:4px"><span class="hc-icon">←</span><span>Supplies to:</span></div><div class="hc-links">${suppliedBy.slice(0,8).map(n=>`<span class="hc-link">${n}</span>`).join('')}${suppliedBy.length>8?`<span class="hc-link">+${suppliedBy.length-8} more</span>`:''}</div>`:''}
    ${e.x?`<div class="hc-export">⚠ ${XL[e.x]}</div>`:''}
  `;
  hcEl.classList.add('show');
  
  if(ev){
    positionHoverCard(ev.clientX, ev.clientY);
  } else if(pinned){
    // Position near the marker on the map
    const pt=map.latLngToContainerPoint([e.la,e.lo]);
    const mapRect=document.getElementById('map').getBoundingClientRect();
    positionHoverCard(mapRect.left+pt.x, mapRect.top+pt.y);
  }
}

function moveHoverCard(ev){
  if(hcPinned)return;
  positionHoverCard(ev.clientX, ev.clientY);
}

function positionHoverCard(cx, cy){
  const pad=16;
  const cw=hcEl.offsetWidth||300;
  const ch=hcEl.offsetHeight||200;
  const vw=window.innerWidth;
  const vh=window.innerHeight;
  
  let x=cx+pad;
  let y=cy-ch/2;
  
  // Keep within viewport
  if(x+cw>vw-pad) x=cx-cw-pad;
  if(y<pad) y=pad;
  if(y+ch>vh-pad) y=vh-ch-pad;
  
  hcEl.style.left=x+'px';
  hcEl.style.top=y+'px';
}

function hideHoverCard(){
  if(hcPinned)return;
  hcEl.classList.remove('show');
}

// Click on map background to dismiss pinned card
map.on('click',function(ev){
  if(!ev.originalEvent.target.closest('.q-marker')){
    sel=null;
    hcPinned=false;
    hcEl.classList.remove('show');
    buildMarkers();
    renderList();
  }
});

// ============ UI ============
function renderTabs(){
  document.getElementById('tabs').innerHTML=['all',...Object.keys(CC)].map(k=>
    `<button class="tab${layer===k?' on':''}" onclick="layer='${k}';sel=null;hcPinned=false;hcEl.classList.remove('show');buildMarkers();renderList();renderTabs();renderChips()">${k==='all'?'All ('+D.length+')':CL[k]}</button>`
  ).join('');
}
function renderChips(){
  const c={};D.forEach(e=>c[e.c]=(c[e.c]||0)+1);
  document.getElementById('chips').innerHTML=Object.keys(CC).map(k=>`<span class="chip${layer===k||layer==='all'?' on':''}" style="${layer===k||layer==='all'?'background:'+CC[k]+'18;color:'+CC[k]+';border-color:'+CC[k]+'30':''}" onclick="layer='${k}';sel=null;hcPinned=false;hcEl.classList.remove('show');buildMarkers();renderList();renderTabs();renderChips()">${CL[k]} ${c[k]||0}</span>`).join('');
}
function renderList(){
  const q=document.getElementById('search').value.toLowerCase();
  const f=D.filter(e=>(layer==='all'||e.c===layer)&&(!q||e.n.toLowerCase().includes(q)||e.s.toLowerCase().includes(q)||e.ci.toLowerCase().includes(q))).sort((a,b)=>a.n.localeCompare(b.n));
  document.getElementById('elist').innerHTML=f.map(e=>`<div class="ei${sel===e?' sel':''}" onclick="selectFromList('${e.n.replace(/'/g,"\\'")}',${e.la},${e.lo})">
    <div class="dot" style="background:${CC[e.c]}"></div>
    <span class="nm">${e.n}</span>
    ${e.x?'<span class="fl xf">⚠</span>':''}
    <span class="co">${e.co}</span>
  </div>`).join('');
}
function selectFromList(name,la,lo){
  sel=D.find(x=>x.n===name)||null;
  buildMarkers();
  renderList();
  // On mobile, scroll the map into view first
  const mapEl=document.getElementById('map');
  if(window.innerWidth<=1024){
    mapEl.scrollIntoView({behavior:'smooth',block:'start'});
  }
  map.setView([la,lo],5,{animate:true});
  if(sel){
    setTimeout(()=>{map.invalidateSize();showHoverCard(sel,null,true);},400);
  }
}
function renderLegend(){
  document.getElementById('mapLegend').innerHTML=Object.keys(CC).map(k=>`<div class="ml"><i style="background:${CC[k]}"></i>${CL[k]}</div>`).join('')+`<div class="ml"><i style="background:transparent;border:2px solid #ff1744;border-radius:50%"></i>Export Controlled</div>`;
}

<div class="card"><div class="card-t"><span class="badge b-c">ANALYSIS</span> Chokepoint Summary</div><div class="card-b" style="font-size:13px">
<b style="color:#ff1744">① Dilution Fridges:</b> 2 dominant + 8 secondary. 6-9mo lead. >$500K. ECCN 3B903.<br><br>
<b style="color:#ff1744">② He-3:</b> Single source (nuclear byproduct). No scale plan. All DR-dependent modalities gated.<br><br>
<b style="color:#ff1744">③ Parametric Amplifiers (JPA/TWPA):</b> 5 commercial vendors, mostly handcrafted. ECCN 3A901. Scaling bottleneck.<br><br>
<b style="color:#ff6d00">④ Precision Lasers:</b> TOPTICA dominant for ion/atom. 5-10 lasers per QC. EU concentration. NOT yet export controlled.<br><br>
<b style="color:#ff6d00">⑤ Niobium:</b> Brazil CBMM = 90% global. No diversification for ultra-pure grade.<br><br>
<b style="color:#ff6d00">⑥ RE Processing:</b> China 91%. Controls on Er, Yb, Gd, Ga, Ge impact photonics & cryo directly.
</div></div>

<div class="card"><div class="card-t"><span class="badge b-i">CONCLUSIONS</span> Strategic Patterns</div><div class="card-b" style="font-size:13px">
<b>① US-EU-AU trilateral</b> dominates QPU + components but mineral dependency on CN/BR creates structural exposure.<br><br>
<b>② Delft = silent powerhouse</b> — Qblox, Delft Circuits, Single Quantum, QuantWare, Leiden Cryo all within 5km.<br><br>
<b>③ Munich = laser corridor</b> — TOPTICA, Menlo, Qubig, Rohde & Schwarz, Siltronic, Hübner all within 50km.<br><br>
<b>④ Export controls have gaps</b> — lasers, vacuum, AOMs, control electronics remain uncontrolled despite being critical for trapped-ion/atom systems.<br><br>
<b>⑤ China localizing fast</b> — 3+ domestic DR makers, full-stack QPU, world's largest QKD network. BIS listings accelerating, not blocking.<br><br>
<b>⑥ "Modality-agnostic" suppliers</b> (control electronics, RF) serve ALL qubit types — lowest risk, highest leverage.
</div></div>
